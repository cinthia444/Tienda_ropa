<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Editar Producto</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
}

.card{
    border:none;
    border-radius:15px;
}

.card-header{
    border-radius:15px 15px 0 0 !important;
}

</style>

</head>

<body>

<div class="container mt-5">

    <div class="card shadow mx-auto" style="max-width:700px;">

        <div class="card-header bg-warning">
            <h3 class="mb-0">✏️ Editar Producto</h3>
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">
                    <label class="form-label">Nombre</label>

                    <input
                        type="text"
                        name="nombre"
                        class="form-control"
                        value="{{ producto[1] }}"
                        required>
                </div>

                <div class="mb-3">

                    <label class="form-label">Categoría</label>

                    <select name="categoria" class="form-select">

                        <option {% if producto[2]=='Playeras' %}selected{% endif %}>Playeras</option>

                        <option {% if producto[2]=='Pantalones' %}selected{% endif %}>Pantalones</option>

                        <option {% if producto[2]=='Chaquetas' %}selected{% endif %}>Chaquetas</option>

                        <option {% if producto[2]=='Sudaderas' %}selected{% endif %}>Sudaderas</option>

                        <option {% if producto[2]=='Tenis' %}selected{% endif %}>Tenis</option>

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">Talla</label>

                    <input
                        type="text"
                        name="talla"
                        class="form-control"
                        value="{{ producto[3] }}"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">Color</label>

                    <input
                        type="text"
                        name="color"
                        class="form-control"
                        value="{{ producto[4] }}"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">Precio</label>

                    <input
                        type="number"
                        step="0.01"
                        name="precio"
                        class="form-control"
                        value="{{ producto[5] }}"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">Stock</label>

                    <input
                        type="number"
                        name="stock"
                        class="form-control"
                        value="{{ producto[6] }}"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">Imagen</label>

                    <input
                        type="text"
                        name="imagen"
                        class="form-control"
                        value="{{ producto[7] }}"
                        placeholder="chaquetanike.jpg">

                    <small class="text-muted">
                        Nombre del archivo dentro de static/img
                    </small>

                </div>

                <button type="submit" class="btn btn-success">
                    Guardar Cambios
                </button>

                <a href="/productos" class="btn btn-secondary">
                    Cancelar
                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
