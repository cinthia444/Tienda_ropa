<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Tienda Ropa - Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    height:100vh;
    background:linear-gradient(135deg,#000000,#2c2c2c);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
}

.login-box{
    background:white;
    width:420px;
    padding:40px;
    border-radius:20px;
    box-shadow:0px 10px 30px rgba(0,0,0,.3);
}

.logo{
    font-size:40px;
    font-weight:bold;
    text-align:center;
    margin-bottom:10px;
}

.subtitulo{
    text-align:center;
    color:gray;
    margin-bottom:30px;
}

.form-control{
    height:50px;
    border-radius:10px;
}

.btn-login{
    height:50px;
    border-radius:10px;
    background:black;
    color:white;
    font-weight:bold;
}

.btn-login:hover{
    background:#222;
    color:white;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:gray;
    font-size:14px;
}

</style>

</head>

<body>

<div class="login-box">

    <div class="logo">
        ZARA STYLE
    </div>

    <div class="subtitulo">
        Sistema de Inventario de Ropa
    </div>

    <form action="/dashboard">

        <div class="mb-3">
            <input
                type="text"
                class="form-control"
                placeholder="Usuario"
                required>
        </div>

        <div class="mb-3">
            <input
                type="password"
                class="form-control"
                placeholder="Contraseña"
                required>
        </div>

        <button
            type="submit"
            class="btn btn-login w-100">
            Iniciar Sesión
        </button>

    </form>

    <div class="footer">
        Fashion Inventory System © 2026
    </div>

</div>

</body>
</html>
