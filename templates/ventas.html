<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Ventas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
}

.sidebar{
    width:250px;
    height:100vh;
    background:#1f2937;
    position:fixed;
}

.sidebar h3{
    color:white;
    text-align:center;
    padding:20px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:15px 25px;
}

.sidebar a:hover{
    background:#374151;
}

.content{
    margin-left:250px;
    padding:30px;
}

</style>

</head>

<body>

<div class="sidebar">

    <h3>Tienda Ropa</h3>

    <a href="/dashboard">🏠 Dashboard</a>
    <a href="/productos">👕 Productos</a>
    <a href="/ventas">💰 Ventas</a>
    <a href="/reportes">📊 Reportes</a>
    <a href="/historial_ventas">📋 Historial Ventas</a>

</div>

<div class="content">

    <h2 class="mb-4">Registro de Ventas</h2>

    <div class="card shadow p-4">

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">
                    Producto
                </label>

                <select name="producto_id" class="form-control" required>

                    {% for producto in productos %}

                    <option value="{{ producto[0] }}">
                        {{ producto[1] }} (Stock: {{ producto[6] }})
                    </option>

                    {% endfor %}

                </select>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Cantidad Vendida
                </label>

                <input
                    type="number"
                    name="cantidad"
                    class="form-control"
                    required>

            </div>

            <button class="btn btn-success">
                Registrar Venta
            </button>

        </form>

    </div>

</div>

</body>
</html>
