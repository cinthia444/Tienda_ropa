<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Carrito de Compras</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f5f5;
}

.titulo{
    font-weight:bold;
}

.card-producto{
    border:none;
    border-radius:15px;
}

.imagen{
    height:120px;
    width:120px;
    object-fit:cover;
    border-radius:10px;
}

.resumen{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

</style>

</head>

<body>

<div class="container mt-5">

```
<div class="d-flex justify-content-between align-items-center mb-4">

    <h2 class="titulo">
        🛒 Mi Carrito
    </h2>

    <a href="/productos" class="btn btn-secondary">
        Seguir Comprando
    </a>

</div>

<div class="row">

    <div class="col-md-8">

        {% for producto in productos %}

        <div class="card card-producto shadow-sm mb-3">

            <div class="card-body">

                <div class="row align-items-center">

                    <div class="col-md-3">

                        <img
                            src="/static/img/{{ producto[7] }}"
                            class="imagen"
                            onerror="this.src='/static/img/default.png'">

                    </div>

                    <div class="col-md-5">

                        <h5>{{ producto[1] }}</h5>

                        <p class="mb-1">
                            Categoría: {{ producto[2] }}
                        </p>

                        <p class="mb-1">
                            Talla: {{ producto[3] }}
                        </p>

                        <p>
                            Color: {{ producto[4] }}
                        </p>

                    </div>

                    <div class="col-md-2">

                        <h5 class="text-success">
                            ${{ producto[5] }}
                        </h5>

                    </div>

                    <div class="col-md-2">

                        <a href="/eliminar_carrito/{{ producto[0] }}"
                           class="btn btn-danger btn-sm">
                           Eliminar
                        </a>

                    </div>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

    <div class="col-md-4">

        <div class="resumen">

            <h4>Resumen</h4>

            <hr>

            <h3 class="text-success">
                Total: ${{ total }}
            </h3>

            <a href="/finalizar_compra"
   class="btn btn-dark w-100 mt-3">
   Finalizar Compra
</a>

        </div>

    </div>

</div>
```

</div>

</body>
</html>
