<!DOCTYPE html>

<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{{ producto[1] }}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f8f9fa;
}

.producto-img{
    width:100%;
    height:650px;
    object-fit:cover;
    border-radius:15px;
}

.precio{
    font-size:2rem;
    font-weight:bold;
    color:#000;
}

.badge-categoria{
    background:#000;
    color:white;
    padding:8px 15px;
    border-radius:30px;
}

.info-box{
    background:white;
    border-radius:15px;
    padding:35px;
}

.btn-comprar{
    width:100%;
    padding:15px;
    font-size:18px;
}

</style>

</head>

<body>

<div class="container py-5">

```
<a href="/productos" class="btn btn-outline-dark mb-4">
    ← Volver al catálogo
</a>

<div class="row">

    <div class="col-lg-6">

        <img
            src="/static/img/{{ producto[7] }}"
            class="producto-img"
            onerror="this.src='/static/img/default.png'">

    </div>

    <div class="col-lg-6">

        <div class="info-box shadow">

            <span class="badge-categoria">
                {{ producto[2] }}
            </span>

            <h1 class="mt-3">
                {{ producto[1] }}
            </h1>

            <div class="precio mt-3">
                ${{ producto[5] }}
            </div>

            <hr>

            <h5>Detalles del producto</h5>

            <p>
                <strong>Talla:</strong>
                {{ producto[3] }}
            </p>

            <p>
                <strong>Color:</strong>
                {{ producto[4] }}
            </p>

            <p>
                <strong>Disponibles:</strong>
                {{ producto[6] }} unidades
            </p>

            <div class="mt-4">

                <a href="/agregar_carrito/{{ producto[0] }}"
   class="btn btn-dark btn-lg">
   🛒 Agregar al carrito
</a>

            </div>

        </div>

    </div>

</div>
```

</div>

</body>
</html>
