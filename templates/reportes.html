<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Reportes</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
}

.sidebar{
    width:250px;
    height:100vh;
    background:#1f2937;
    position:fixed;
}

.sidebar h3{
    color:white;
    text-align:center;
    padding:20px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:15px 25px;
}

.sidebar a:hover{
    background:#374151;
}

.content{
    margin-left:250px;
    padding:30px;
}

.card{
    border:none;
    border-radius:15px;
}

</style>

</head>

<body>

<div class="sidebar">

    <h3>Tienda Ropa</h3>

    <a href="/dashboard">🏠 Dashboard</a>
    <a href="/productos">👕 Productos</a>
    <a href="/ventas">💰 Ventas</a>
    <a href="/reportes">📊 Reportes</a>
    <a href="/historial_ventas">📋 Historial Ventas</a>

</div>

<div class="content">

    <h1 class="mb-4">📊 Reportes del Sistema</h1>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="card shadow p-4">
                <h5>Total Productos</h5>
                <h2>{{ total_productos }}</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow p-4">
                <h5>Stock Total</h5>
                <h2>{{ total_stock }}</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow p-4">
                <h5>Stock Bajo</h5>
                <h2>{{ stock_bajo }}</h2>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow p-4">
                <h5>Valor del Inventario</h5>
                <h2>${{ valor_inventario }}</h2>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow p-4">
                <h5>Total Ventas</h5>
                <h2>{{ total_ventas }}</h2>
            </div>
        </div>

    </div>

</div>

</body>
</html>
