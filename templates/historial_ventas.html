<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Historial de Ventas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
}

.sidebar{
    width:250px;
    height:100vh;
    background:#1f2937;
    position:fixed;
}

.sidebar h3{
    color:white;
    text-align:center;
    padding:20px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:15px 25px;
}

.sidebar a:hover{
    background:#374151;
}

.content{
    margin-left:250px;
    padding:30px;
}

</style>

</head>

<body>

<div class="sidebar">

    <h3>Tienda Ropa</h3>

    <a href="/dashboard">🏠 Dashboard</a>
    <a href="/productos">👕 Productos</a>
    <a href="/ventas">💰 Ventas</a>
    <a href="/historial_ventas">📋 Historial Ventas</a>
    <a href="/reportes">📊 Reportes</a>
    <a href="/">🚪 Salir</a>

</div>

<div class="content">

    <h2 class="mb-4">Historial de Ventas</h2>

    <table class="table table-bordered table-hover bg-white">

        <thead class="table-dark">

            <tr>
                <th>ID</th>
                <th>Producto</th>
                <th>Cantidad</th>
                <th>Fecha</th>
            </tr>

        </thead>

        <tbody>

        {% for venta in ventas %}

            <tr>
                <td>{{ venta[0] }}</td>
                <td>{{ venta[1] }}</td>
                <td>{{ venta[2] }}</td>
                <td>{{ venta[3] }}</td>
            </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
