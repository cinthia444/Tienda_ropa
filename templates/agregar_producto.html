<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Agregar Producto</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
}

.card{
    border:none;
    border-radius:15px;
}

.card-header{
    border-radius:15px 15px 0 0 !important;
}

</style>

</head>

<body>

<div class="container mt-5">

    <div class="card shadow mx-auto" style="max-width:700px;">

        <div class="card-header bg-dark text-white">
            <h4 class="mb-0">➕ Nuevo Producto</h4>
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">
                    <label class="form-label">Nombre del producto</label>
                    <input
                        type="text"
                        name="nombre"
                        class="form-control"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Categoría</label>

                    <select name="categoria" class="form-select">

                        <option>Playeras</option>
                        <option>Pantalones</option>
                        <option>Chaquetas</option>
                        <option>Sudaderas</option>
                        <option>Tenis</option>

                    </select>

                </div>

                <div class="mb-3">
                    <label class="form-label">Talla</label>
                    <input
                        type="text"
                        name="talla"
                        class="form-control"
                        placeholder="M, L, XL..."
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Color</label>
                    <input
                        type="text"
                        name="color"
                        class="form-control"
                        placeholder="Negro, Blanco, Azul..."
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Precio</label>
                    <input
                        type="number"
                        step="0.01"
                        name="precio"
                        class="form-control"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Stock</label>
                    <input
                        type="number"
                        name="stock"
                        class="form-control"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Imagen</label>

                    <input
                        type="text"
                        name="imagen"
                        class="form-control"
                        placeholder="chaquetanike.jpg"
                        required>

                    <small class="text-muted">
                        Escribe exactamente el nombre del archivo que está en
                        static/img/
                    </small>

                </div>

                <button type="submit" class="btn btn-success">
                    Guardar Producto
                </button>

                <a href="/productos" class="btn btn-secondary">
                    Volver
                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
